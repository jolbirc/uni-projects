<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>BOOKING | STAYSPACE</title>
</head>

<body>
  <!-- SITEWIDE HEADER/NAV -->
  <a class="skip-link" href="#main">Skip to Main Content</a>

  <header class="site-header">
    <div class="container">
      <nav class="site-nav" aria-label="Primary navigation">
          <a class="branding" href="index.html">
            <img class="branding-logo" src="/img/icons/logo.svg" alt="StaySpace Logo">
          </a>

          <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="details.html">Details</a></li>
            <li><a href="contact.html">Book</a></li>
          </ul>

          <a class="airbnb" href="https://airbnb.com" target="_blank" rel="noopener noreferrer">
            <img class="airbnb-logo" src="/img/icons/Airbnb-Logo-2014-718276488.png" alt="Airbnb Logo">
          </a>
      </nav>
    </div>
  </header>
  
  <main id="main">
    <!--BOOKING REQUEST FORM -->
    <form id="booking-form" method="POST">
      <fieldset>
        <legend>Your Information</legend>

        <label for="forename">Forename:</label>
        <input type="text" id="forename" name="forename" required>

        <label for="surname">Surname:</label>
        <input type="text" id="surname" name="forename" required>

        <label for="phone">Contact Number:</label>
        <input type="tel" id="phone" name="phone" required>
      </fieldset>

      <fieldset>
        <legend>Booking Details</legend>

        <label for="check-in">Check-in Date:</label>
        <input type="date" id="check-in" name="check-in" required>

        <label for="check-out">Check-out Date:</label>
        <input type="date" id="check-out" name="check-out" required>

        <label for="room-choice">Room Type:</label>
        <select name="room-choice" id="room-choice" required>
          <option value="">Select:</option>
          <option value="single">Single Room</option>
          <option value="double">Double Room</option>
          <option value="party">Party Suite (up to 8 guests)</option>
          <option value="family">Family Suite</option>
        </select>

        <button type="submit">Request Your Booking!</button>
        <button type="reset">Clear Form</button>
      </fieldset>
    </form>
  </main>
</body>
</html>
