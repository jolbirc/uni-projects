<!DOCTYPE html>
<html lang="en">
<!-- 
  Design choices:
    - No opener, no referrer (https://stackoverflow.com/questions/57628890/why-people-use-rel-noopener-noreferrer-instead-of-just-rel-noreferrer)

  Accessibility considerations:
    - Consistently positioned skip navigation control (https://www.w3.org/WAI/WCAG22/Understanding/consistent-navigation.html)
    - Aria labels (https://www.w3docs.com/snippets/html/what-is-aria-label-and-how-to-use-it.html)
-->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>HOME | STAYSPACE</title>
</head>

<body>
  <!-- SITEWIDE HEADER/NAV -->
  <a class="skip-link" href="#main">Skip to Main Content</a>

  <header class="site-header">
    <div class="container">
      <nav class="site-nav" aria-label="Primary navigation">
          <a class="branding" href="index.html">
            <img class="branding-logo" src="/img/icons/logo.svg" alt="StaySpace Logo">
          </a>

          <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="details.html">Details</a></li>
            <li><a href="contact.html">Book</a></li>
          </ul>

          <a class="airbnb" href="https://airbnb.com" target="_blank" rel="noopener noreferrer">
            <img class="airbnb-logo" src="/img/icons/Airbnb-Logo-2014-718276488.png" alt="Airbnb Logo">
          </a>
      </nav>
    </div>
  </header>
  
  <main id="main">
    <!-- LANDING PAGE HERO IMG -->
    <section class="hero section">
      <img class="section-bg" src="/img/theme/hero-1.png" alt="">
      <div class="container hero-content">
        <p class="welcome-text">WELCOME TO</p>
        <h1 class="screen-reader-only">TRANQUILITY BASE</h1>
        <img class="hero-title" src="/img/icons/TRANQUILITY-BASE.svg" alt="TRANQUILITY BASE">
      </div>
    </section>

    <!-- KEY AMENITIES -->
    <section class="amenities section">
      <img class="section-bg" src="/img/theme/index-1.png" alt="">
      <h2 class="section-title">AMENITIES</h2>
      <div class="amenities-grid">
        <div class="amenity-item">
          <div class="amenity-icon">
            <!-- TODO: add icons once rest of skeleton styling built -->
            <img src="/img/icons/headset.png" alt="">
          </div>
          <p>Purpose built VR room, bringing the stars to you!</p>
        </div>
        <div class="amenity-item">
          <div class="amenity-icon">
            <!-- TODO: add icons once rest of skeleton styling built -->
             <img src="/img/icons/space.png" alt="">
          </div>
          <p>Immersive interstellar sci-fi decor throughout.</p>
        </div>
        <div class="amenity-item">
          <div class="amenity-icon">
            <!-- TODO: add icons once rest of skeleton styling built -->
            <img src="/img/icons/gaming.png" alt="">
          </div>
          <p>High-end simulators and gaming rigs.</p>
        </div>
      </div>
    </section>

    <!-- QUICK ENQUIRY -->
    <section class="contact section">
      <img class="section-bg" src="/img/theme/index-2.png" alt="">
      <h2 class="section-title">REQUEST AN BOOKING FORM</h2>
      <form>
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <button type="submit">Request Form</button>
      </form>
      <a href="contact.html">... or book directly here!</a>
    </section>
  </main>
</body>
</html>
